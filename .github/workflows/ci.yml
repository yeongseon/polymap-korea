name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - apps/api
          - pipeline
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: |
          if [ "${{ matrix.project }}" = "apps/api" ]; then
            uv run mypy src tests
          else
            uv run mypy common normalization publish sources tests
          fi

      - name: Pytest
        run: uv run pytest

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
        working-directory: .

      - name: Lint web app
        run: pnpm --filter web lint
        working-directory: .

      - name: Typecheck web app
        run: pnpm --filter web exec tsc --noEmit
        working-directory: .

      - name: Build web app
        run: pnpm --filter web build
        working-directory: .
