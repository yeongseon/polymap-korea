name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - apps/api
          - pipeline
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create workspace root for local packages
        run: |
          printf '[tool.uv.workspace]\nmembers = ["apps/api", "pipeline", "packages/ontology"]\n\n[tool.uv.sources]\npolymap-ontology = { workspace = true }\n' > pyproject.toml
        working-directory: .

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: |
          if [ "${{ matrix.project }}" = "apps/api" ]; then
            uv run mypy src tests
          else
            uv run mypy common normalization publish sources tests
          fi

      - name: Pytest
        run: uv run pytest

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint web app
        run: pnpm --filter web lint
        working-directory: .

      - name: Typecheck web app
        run: pnpm --filter web exec tsc --noEmit
        working-directory: .

      - name: Build web app
        run: pnpm --filter web build
        working-directory: .

  docker:
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t polymap-api:ci .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t polymap-web:ci .
      - name: Build Pipeline image
        run: docker build -f pipeline/Dockerfile -t polymap-pipeline:ci .
