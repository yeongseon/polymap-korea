name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - apps/api
          - pipeline
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: |
          if [ "${{ matrix.project }}" = "apps/api" ]; then
            uv run mypy src tests
          else
            uv run mypy common normalization publish sources tests
          fi

      - name: Pytest
        run: uv run pytest

  migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: polymap_test
          POSTGRES_USER: polymap
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polymap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - name: Run Alembic migrations
        env:
          POLYMAP_DATABASE_URL: postgresql+asyncpg://polymap:test@localhost:5432/polymap_test
        run: uv run alembic upgrade head
      - name: Verify current revision
        env:
          POLYMAP_DATABASE_URL: postgresql+asyncpg://polymap:test@localhost:5432/polymap_test
        run: uv run alembic current

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint web app
        run: pnpm --filter web lint
        working-directory: .

      - name: Typecheck web app
        run: pnpm --filter web exec tsc --noEmit
        working-directory: .

      - name: Test web app
        run: pnpm --filter web test
        working-directory: .

      - name: Build web app
        run: pnpm --filter web build
        working-directory: .

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - run: pnpm install --frozen-lockfile
      - name: Install API deps
        run: uv sync --all-extras
        working-directory: apps/api
      - name: Generate contracts
        run: bash scripts/generate-contracts.sh
      - name: Check for drift
        run: git diff --exit-code apps/web/src/lib/generated-types.ts packages/contracts/src/index.ts

  docker:
    runs-on: ubuntu-latest
    needs: [python, typescript, migration, contracts]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t polymap-api:ci .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t polymap-web:ci .
      - name: Build Pipeline image
        run: docker build -f pipeline/Dockerfile -t polymap-pipeline:ci .
