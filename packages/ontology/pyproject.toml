[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[project]
name = "polymap-ontology"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/polymap_ontology"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
