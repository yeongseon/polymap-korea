services:
  postgres:
    image: postgres:16-alpine
    profiles: ["core", "full"]
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: polymap
      POSTGRES_USER: polymap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymap_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

  redis:
    image: redis:7-alpine
    profiles: ["core", "full"]
    ports: ["6379:6379"]

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    profiles: ["search", "full"]
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["core", "full"]
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-polymap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-polymap_dev}
    volumes:
      - minio_data:/data

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    profiles: ["orchestrator", "full"]
    ports: ["4200:4200"]
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://polymap:${POSTGRES_PASSWORD:-polymap_dev}@postgres:5432/prefect
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
