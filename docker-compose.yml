services:
  postgres:
    image: postgres:16-alpine
    profiles: ["core", "full"]
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: polymap
      POSTGRES_USER: polymap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymap -d polymap"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["core", "full"]
    ports: ["8000:8000"]
    command: >-
      sh -c "alembic upgrade head && exec uvicorn polymap_api.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres
      - minio
      - prefect-server
    environment:
      POLYMAP_DATABASE_URL: postgresql+asyncpg://polymap:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymap
      POLYMAP_PREFECT_API_URL: http://prefect-server:4200/api
      POLYMAP_S3_ENDPOINT: http://minio:9000
      POLYMAP_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-polymap}
      POLYMAP_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      POLYMAP_S3_BUCKET_RAW: polymap-raw
      POLYMAP_OPENSEARCH_URL: http://opensearch:9200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    profiles: ["core", "full"]
    ports: ["3000:3000"]
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      API_URL_INTERNAL: http://api:8000/api/v1

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    profiles: ["search", "full"]
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      # Enable OpenSearch security in production deployments.
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["core", "full"]
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-polymap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    profiles: ["core", "orchestrator", "full"]
    ports: ["4200:4200"]
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://polymap:${POSTGRES_PASSWORD:-changeme}@postgres:5432/prefect
    depends_on:
      - postgres

  pipeline-worker:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    profiles: ["core", "full"]
    depends_on:
      - postgres
      - minio
      - prefect-server
    environment:
      DATABASE_URL: postgresql+asyncpg://polymap:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymap
      PREFECT_API_URL: http://prefect-server:4200/api
      POLYMAP_S3_ENDPOINT: http://minio:9000
      POLYMAP_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-polymap}
      POLYMAP_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      POLYMAP_S3_BUCKET_RAW: polymap-raw

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    profiles: ["monitoring", "full"]
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: postgresql://polymap:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymap?sslmode=disable

  node-exporter:
    image: prom/node-exporter:latest
    profiles: ["monitoring", "full"]
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring", "full"]
    ports: ["9090:9090"]
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring", "full"]
    ports: ["3001:3000"]
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  minio_data:
  grafana_data:
